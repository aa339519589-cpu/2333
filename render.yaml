services:
  - type: web
    name: aether-grid
    runtime: static
    repo: https://github.com/aa339519589-cpu/2333
    branch: main
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
